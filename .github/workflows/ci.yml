name: Build and Release

on:
  pull_request:
    branches: [main]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Test
        run: go test -v ./...

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: |
          GOOS=linux GOARCH=amd64 go build -o affine-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -o affine-linux-arm64 .
          GOOS=darwin GOARCH=amd64 go build -o affine-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o affine-darwin-arm64 .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            affine-linux-amd64
            affine-linux-arm64
            affine-darwin-amd64
            affine-darwin-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}